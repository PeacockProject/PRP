name: ci
on: [push, pull_request]
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: shellcheck scripts/ overlay/ initramfs/rootfs/
        run: |
          set -e
          find scripts overlay initramfs/rootfs -type f \( -name '*.sh' -o -perm -u+x \) \
            -not -path '*/build-*' \
            -print0 | xargs -0 -r shellcheck -S warning || true
        # initial run is advisory; tighten -S after fixing existing findings.
